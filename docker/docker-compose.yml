version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: land-registry-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - land-registry-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: land-registry-api
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/land-registry
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - mongodb
    networks:
      - land-registry-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  land-registry-network:
    driver: bridge
